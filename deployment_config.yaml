name: PR Review Agent
summary: An AI-powered agent for automated pull request review, including typo detection, code quality checks, and security vulnerability scanning. It monitors specified GitHub repositories and posts review comments.
environment_variables:
  - name: GITHUB_TOKEN
    value: <your_github_personal_access_token>
    description: Your GitHub Personal Access Token with 'repo' permissions. This is required for the agent to interact with GitHub APIs (e.g., fetch PRs, post comments).
  - name: GITHUB_WEBHOOK_SECRET
    value: <your_github_webhook_secret>
    description: An optional secret for verifying GitHub webhook payloads. Leave empty if not using webhooks.
  - name: AI_PROVIDER
    value: openai
    description: The AI service provider to use for code reviews. Choose between "openai" or "anthropic".
  - name: OPENAI_API_KEY
    value: <your_openai_api_key>
    description: The API key for OpenAI services. Required if AI_PROVIDER is set to "openai".
  - name: ANTHROPIC_API_KEY
    value: <your_anthropic_api_key>
    description: The API key for Anthropic services. Required if AI_PROVIDER is set to "anthropic".
  - name: REVIEW_TYPOS
    value: "true"
    description: Set to "true" to enable typo detection and grammar correction in PRs. Set to "false" to disable.
  - name: REVIEW_CODE_QUALITY
    value: "true"
    description: Set to "true" to enable AI-powered code quality reviews. Set to "false" to disable.
  - name: REVIEW_SECURITY
    value: "true"
    description: Set to "true" to enable security vulnerability pattern detection. Set to "false" to disable.
  - name: AUTO_APPROVE_MINOR
    value: "false"
    description: Set to "true" to automatically approve PRs if no issues are found. Set to "false" to disable.
  - name: MAX_FILES_PER_REVIEW
    value: "50"
    description: The maximum number of files to review per pull request.
  - name: MAX_LINES_PER_FILE
    value: "1000"
    description: The maximum number of lines (changes) within a single file to review.
  - name: WATCHED_REPOSITORIES
    value: <owner/repo1,owner/repo2>
    description: A comma-separated list of GitHub repositories (e.g., "octocat/Spoon-Knife,myorg/myrepo") that the agent should monitor for new pull requests.
  - name: AGENT_NAME
    value: PR Review Bot
    description: The name that the agent will use when posting comments on GitHub pull requests.
  - name: POLLING_INTERVAL
    value: "300"
    description: The frequency (in seconds) at which the agent checks for new pull requests in the watched repositories.
  - name: MAX_RETRIES
    value: "3"
    description: The maximum number of retries for API calls.