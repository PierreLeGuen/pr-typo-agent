name: pr-typo-agent
summary: AI-powered PR review agent for automated code review and typo detection
environment_variables:
  - name: GITHUB_TOKEN
    value: <your_github_personal_access_token_here>
    description: Your GitHub Personal Access Token with repo permissions, used for authenticating with the GitHub API.
  - name: GITHUB_WEBHOOK_SECRET
    value: ""
    description: An optional secret for verifying GitHub webhook payloads, if advanced integrations are used.
  - name: AI_PROVIDER
    value: openai
    description: Specifies the AI service provider to use, either "openai" or "anthropic".
  - name: OPENAI_API_KEY
    value: <your_openai_api_key_here>
    description: The API key for OpenAI, required if AI_PROVIDER is set to "openai".
  - name: ANTHROPIC_API_KEY
    value: ""
    description: The API key for Anthropic, required if AI_PROVIDER is set to "anthropic".
  - name: REVIEW_TYPOS
    value: "true"
    description: A boolean flag (true/false) to enable or disable typo detection in PR reviews.
  - name: REVIEW_CODE_QUALITY
    value: "true"
    description: A boolean flag (true/false) to enable or disable AI-powered code quality reviews.
  - name: REVIEW_SECURITY
    value: "true"
    description: A boolean flag (true/false) to enable or disable security vulnerability reviews.
  - name: REVIEW_PERFORMANCE
    value: "false"
    description: A boolean flag (true/false) to enable or disable performance reviews.
  - name: AUTO_APPROVE_MINOR
    value: "false"
    description: A boolean flag (true/false) to automatically approve PRs if no issues are found.
  - name: MAX_FILES_PER_REVIEW
    value: "50"
    description: The maximum number of files the agent will review per pull request.
  - name: MAX_LINES_PER_FILE
    value: "1000"
    description: The maximum number of lines of code to review per file.
  - name: WATCHED_REPOSITORIES
    value: ""
    description: A comma-separated list of GitHub repositories (e.g., owner/repo,owner/repo2) that the agent should monitor for new PRs.
  - name: AGENT_NAME
    value: "PR Review Bot"
    description: The name that the bot will use when posting comments on pull requests.
  - name: POLLING_INTERVAL
    value: "300"
    description: The frequency (in seconds) at which the agent checks for new pull requests.
  - name: MAX_RETRIES
    value: "3"
    description: The maximum number of retries for API calls in case of transient errors.