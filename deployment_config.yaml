name: PR Review Agent
summary: AI-powered PR review agent for automated code review and typo detection
environment_variables:
  - name: GITHUB_TOKEN
    value: <your_github_personal_access_token_here>
    description: A GitHub Personal Access Token required for the agent to authenticate with the GitHub API and perform actions like fetching PRs, files, and posting comments.
  - name: GITHUB_WEBHOOK_SECRET
    value: ""
    description: An optional secret used for validating GitHub webhook payloads, enhancing security for advanced integrations.
  - name: AI_PROVIDER
    value: openai
    description: Specifies which AI service to use for code review and typo detection. Choose between "openai" or "anthropic".
  - name: OPENAI_API_KEY
    value: <your_openai_api_key_here>
    description: The API key for OpenAI, required if AI_PROVIDER is set to "openai".
  - name: ANTHROPIC_API_KEY
    value: ""
    description: The API key for Anthropic, required if AI_PROVIDER is set to "anthropic".
  - name: REVIEW_TYPOS
    value: "true"
    description: A boolean flag (true/false) to enable or disable typo and grammar review.
  - name: REVIEW_CODE_QUALITY
    value: "true"
    description: A boolean flag (true/false) to enable or disable AI-powered code quality review.
  - name: REVIEW_SECURITY
    value: "true"
    description: A boolean flag (true/false) to enable or disable security vulnerability review.
  - name: AUTO_APPROVE_MINOR
    value: "false"
    description: A boolean flag (true/false) indicating whether the agent should automatically approve PRs if no issues are found.
  - name: MAX_FILES_PER_REVIEW
    value: "50"
    description: The maximum number of files the agent will review in a single pull request. PRs exceeding this limit will be skipped.
  - name: MAX_LINES_PER_FILE
    value: "1000"
    description: The maximum number of lines of code the agent will review per file. Files exceeding this limit may be partially or entirely skipped.
  - name: WATCHED_REPOSITORIES
    value: ""
    description: A comma-separated list of GitHub repositories (e.g., "owner/repo,owner/repo2") that the agent should monitor for new pull requests.
  - name: AGENT_NAME
    value: PR Review Bot
    description: The name that the agent will use when posting comments on pull requests.
  - name: POLLING_INTERVAL
    value: "300"
    description: The frequency (in seconds) at which the agent checks for new pull requests in monitored repositories.
  - name: MAX_RETRIES
    value: "3"
    description: The maximum number of retries for API calls (e.g., to GitHub or AI providers) in case of transient errors.