name: PR Review Agent
summary: AI-powered PR review agent for automated code review and typo detection
environment_variables:
  - name: GITHUB_TOKEN
    value: <your_github_personal_access_token_here>
    description: Your GitHub Personal Access Token with repo permissions. Get one at https://github.com/settings/tokens.
  - name: GITHUB_WEBHOOK_SECRET
    value: ""
    description: Optional GitHub webhook secret for advanced integrations to verify webhook payloads.
  - name: AI_PROVIDER
    value: openai
    description: Choose your AI provider. Supported values are "openai" or "anthropic".
  - name: OPENAI_API_KEY
    value: <your_openai_api_key_here>
    description: Your OpenAI API Key, required if AI_PROVIDER is set to "openai". Get one at https://platform.openai.com/api-keys.
  - name: ANTHROPIC_API_KEY
    value: ""
    description: Your Anthropic API Key, required if AI_PROVIDER is set to "anthropic". Get one at https://console.anthropic.com/.
  - name: REVIEW_TYPOS
    value: "true"
    description: Enable or disable typo detection reviews (true/false).
  - name: REVIEW_CODE_QUALITY
    value: "true"
    description: Enable or disable AI-powered code quality reviews (true/false).
  - name: REVIEW_SECURITY
    value: "true"
    description: Enable or disable security pattern detection reviews (true/false).
  - name: AUTO_APPROVE_MINOR
    value: "false"
    description: Automatically approve PRs if no issues are found (true/false).
  - name: MAX_FILES_PER_REVIEW
    value: "50"
    description: Maximum number of files the agent will review per pull request.
  - name: MAX_LINES_PER_FILE
    value: "1000"
    description: Maximum number of lines (changes) per file the agent will review.
  - name: WATCHED_REPOSITORIES
    value: ""
    description: A comma-separated list of GitHub repositories (e.g., "owner/repo,owner/repo2") that the agent should monitor for new pull requests.
  - name: AGENT_NAME
    value: PR Review Bot
    description: The name that the agent will use when posting comments on GitHub pull requests.
  - name: POLLING_INTERVAL
    value: "300"
    description: How often (in seconds) the agent will check for new pull requests in the WATCHED_REPOSITORIES.
  - name: MAX_RETRIES
    value: "3"
    description: Maximum number of retries for API calls.