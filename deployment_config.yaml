name: PR Review Agent
summary: AI-powered PR review agent for automated code review and typo detection
environment_variables:
  - name: GITHUB_TOKEN
    value: <your_github_personal_access_token>
    description: Your GitHub Personal Access Token with repo permissions. Required for authenticating with the GitHub API to fetch PRs and post comments.
  - name: GITHUB_WEBHOOK_SECRET
    value: ""
    description: Optional GitHub webhook secret for advanced integrations and validating webhook payloads.
  - name: AI_PROVIDER
    value: openai
    description: Specifies which AI service to use for reviews. Choose between "openai" or "anthropic".
  - name: OPENAI_API_KEY
    value: <your_openai_api_key>
    description: The API key for OpenAI services. Required if AI_PROVIDER is set to "openai".
  - name: ANTHROPIC_API_KEY
    value: ""
    description: The API key for Anthropic services. Required if AI_PROVIDER is set to "anthropic".
  - name: REVIEW_TYPOS
    value: "true"
    description: Set to "true" to enable typo and grammar checking in PRs, "false" to disable.
  - name: REVIEW_CODE_QUALITY
    value: "true"
    description: Set to "true" to enable AI-powered code quality reviews, "false" to disable.
  - name: REVIEW_SECURITY
    value: "true"
    description: Set to "true" to enable security vulnerability checks in the code, "false" to disable.
  - name: AUTO_APPROVE_MINOR
    value: "false"
    description: Set to "true" to automatically approve PRs where the agent finds no issues.
  - name: MAX_FILES_PER_REVIEW
    value: "50"
    description: Maximum number of files the agent will review in a single pull request to prevent excessive processing.
  - name: MAX_LINES_PER_FILE
    value: "1000"
    description: Maximum number of lines per file the agent will review, managing the scope of AI processing.
  - name: WATCHED_REPOSITORIES
    value: ""
    description: A comma-separated list of GitHub repository names (e.g., "owner/repo1,owner/repo2") that the agent should monitor for new pull requests.
  - name: AGENT_NAME
    value: PR Review Bot
    description: The name the bot will use when posting comments on pull requests.
  - name: POLLING_INTERVAL
    value: "300"
    description: How often (in seconds) the agent should check for new pull requests in the WATCHED_REPOSITORIES.
  - name: MAX_RETRIES
    value: "3"
    description: Maximum number of retries for API calls in case of transient errors.