name: PR Review Agent
summary: AI-powered PR review agent for automated code review and typo detection. It monitors GitHub repositories for new pull requests and provides automated feedback.
environment_variables:
  - name: GITHUB_TOKEN
    value: <your_github_personal_access_token>
    description: Your GitHub Personal Access Token with repo permissions, required for the agent to authenticate with the GitHub API.
  - name: GITHUB_WEBHOOK_SECRET
    value: ""
    description: An optional secret for verifying GitHub webhook payloads, used for advanced integrations.
  - name: AI_PROVIDER
    value: openai
    description: Specifies which AI service to use for reviews ("openai" or "anthropic").
  - name: OPENAI_API_KEY
    value: <your_openai_api_key>
    description: Your API key for OpenAI, required if AI_PROVIDER is set to "openai".
  - name: ANTHROPIC_API_KEY
    value: ""
    description: Your API key for Anthropic, required if AI_PROVIDER is set to "anthropic".
  - name: REVIEW_TYPOS
    value: "true"
    description: Set to "true" to enable typo and grammar reviews, "false" to disable.
  - name: REVIEW_CODE_QUALITY
    value: "true"
    description: Set to "true" to enable AI-powered code quality reviews, "false" to disable.
  - name: REVIEW_SECURITY
    value: "true"
    description: Set to "true" to enable security vulnerability reviews, "false" to disable.
  - name: AUTO_APPROVE_MINOR
    value: "false"
    description: Set to "true" to automatically approve PRs if no issues are found.
  - name: MAX_FILES_PER_REVIEW
    value: "50"
    description: The maximum number of files the agent will review in a single pull request.
  - name: MAX_LINES_PER_FILE
    value: "1000"
    description: The maximum number of lines the agent will review per file.
  - name: WATCHED_REPOSITORIES
    value: ""
    description: A comma-separated list of GitHub repositories (e.g., owner/repo,owner/repo2) that the agent should monitor for new pull requests.
  - name: AGENT_NAME
    value: PR Review Bot
    description: The name that will appear in the PR comments posted by the agent.
  - name: POLLING_INTERVAL
    value: "300"
    description: The frequency (in seconds) at which the agent checks for new pull requests in monitored repositories.
  - name: MAX_RETRIES
    value: "3"
    description: The maximum number of retries for API calls.