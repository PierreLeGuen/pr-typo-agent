name: PR Review Agent
summary: AI-powered PR review agent for automated code review and typo detection
environment_variables:
  - name: GITHUB_TOKEN
    value: <your_github_personal_access_token>
    description: GitHub Personal Access Token with repo permissions. Get one at https://github.com/settings/tokens.
  - name: GITHUB_WEBHOOK_SECRET
    value: ""
    description: Optional GitHub webhook secret for advanced integrations.
  - name: AI_PROVIDER
    value: openai
    description: Choose your AI provider: "openai" or "anthropic".
  - name: OPENAI_API_KEY
    value: <your_openai_api_key>
    description: The OpenAI API key to use for the agent. Required if AI_PROVIDER is "openai". Get one at https://platform.openai.com/api-keys.
  - name: ANTHROPIC_API_KEY
    value: ""
    description: The Anthropic API key to use for the agent. Required if AI_PROVIDER is "anthropic". Get one at https://console.anthropic.com/.
  - name: REVIEW_TYPOS
    value: "true"
    description: Enable/disable typo and grammar reviews. Set to "true" or "false".
  - name: REVIEW_CODE_QUALITY
    value: "true"
    description: Enable/disable AI-powered code quality reviews. Set to "true" or "false".
  - name: REVIEW_SECURITY
    value: "true"
    description: Enable/disable security vulnerability reviews. Set to "true" or "false".
  - name: REVIEW_PERFORMANCE
    value: "false"
    description: Enable/disable performance reviews. (Note: This variable is present in example.env but not explicitly used in the provided Python code). Set to "true" or "false".
  - name: AUTO_APPROVE_MINOR
    value: "false"
    description: Automatically approve PRs with no issues found. Set to "true" or "false".
  - name: MAX_FILES_PER_REVIEW
    value: "50"
    description: Maximum number of files to review per PR.
  - name: MAX_LINES_PER_FILE
    value: "1000"
    description: Maximum lines to review per file.
  - name: WATCHED_REPOSITORIES
    value: ""
    description: Comma-separated list of repositories to monitor (e.g., owner/repo,owner/repo2). Required for the agent to monitor PRs.
  - name: AGENT_NAME
    value: PR Review Bot
    description: Name that appears in PR comments.
  - name: POLLING_INTERVAL
    value: "300"
    description: How often to check for new PRs (in seconds).
  - name: MAX_RETRIES
    value: "3"
    description: Maximum retries for API calls.