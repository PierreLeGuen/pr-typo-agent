name: PR Review Agent
summary: AI-powered PR review agent for automated code review and typo detection. It monitors GitHub repositories for new pull requests and provides automated feedback on typos, code quality, and security vulnerabilities.
environment_variables:
  - name: GITHUB_TOKEN
    value: <your_github_personal_access_token_here>
    description: A GitHub Personal Access Token with 'repo' permissions, required for the agent to interact with the GitHub API (e.g., fetch PRs, post comments). Get one at https://github.com/settings/tokens.
  - name: GITHUB_WEBHOOK_SECRET
    value: ""
    description: An optional secret for GitHub webhooks, used for advanced integrations.
  - name: AI_PROVIDER
    value: openai
    description: Specifies which AI service to use for reviews. Choose between "openai" or "anthropic". Defaults to "openai".
  - name: OPENAI_API_KEY
    value: <your_openai_api_key_here>
    description: The API key for OpenAI, required if AI_PROVIDER is set to "openai". Get one at https://platform.openai.com/api-keys.
  - name: ANTHROPIC_API_KEY
    value: ""
    description: The API key for Anthropic, required if AI_PROVIDER is set to "anthropic". Get one at https://console.anthropic.com/.
  - name: REVIEW_TYPOS
    value: "true"
    description: A boolean flag ("true" or "false") to enable or disable typo and grammar reviews. Defaults to "true".
  - name: REVIEW_CODE_QUALITY
    value: "true"
    description: A boolean flag ("true" or "false") to enable or disable AI-powered code quality reviews. Defaults to "true".
  - name: REVIEW_SECURITY
    value: "true"
    description: A boolean flag ("true" or "false") to enable or disable security vulnerability reviews. Defaults to "true".
  - name: AUTO_APPROVE_MINOR
    value: "false"
    description: A boolean flag ("true" or "false") to automatically approve PRs if no issues are found. Defaults to "false".
  - name: MAX_FILES_PER_REVIEW
    value: "50"
    description: The maximum number of files the agent will review per pull request. Defaults to "50".
  - name: MAX_LINES_PER_FILE
    value: "1000"
    description: The maximum number of lines the agent will review per file. Defaults to "1000".
  - name: WATCHED_REPOSITORIES
    value: ""
    description: A comma-separated list of GitHub repositories (e.g., owner/repo,owner/repo2) that the agent should monitor for new pull requests.
  - name: AGENT_NAME
    value: PR Review Bot
    description: The name that the agent will use in its PR comments. Defaults to "PR Review Bot".
  - name: POLLING_INTERVAL
    value: "300"
    description: How often (in seconds) the agent checks for new pull requests when running in monitoring mode. Defaults to "300".
  - name: MAX_RETRIES
    value: "3"
    description: The maximum number of retries for API calls. Defaults to "3".