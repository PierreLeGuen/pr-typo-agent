stdin: false
name: pr-typo-agent
summary: AI-powered PR review agent for automated code review and typo detection
environment_variables:
  - name: GITHUB_TOKEN
    value: <your_github_personal_access_token_here>
    description: Your GitHub Personal Access Token with repo permissions. Get one at https://github.com/settings/tokens.
  - name: GITHUB_WEBHOOK_SECRET
    value: ""
    description: An optional secret for GitHub webhook integrations, used to verify incoming webhook payloads.
  - name: AI_PROVIDER
    value: openai
    description: Choose your AI provider: "openai" or "anthropic".
  - name: OPENAI_API_KEY
    value: <your_openai_api_key_here>
    description: The OpenAI API Key, required if AI_PROVIDER is set to "openai". Get one at https://platform.openai.com/api-keys.
  - name: ANTHROPIC_API_KEY
    value: ""
    description: The Anthropic API Key, required if AI_PROVIDER is set to "anthropic". Get one at https://console.anthropic.com/.
  - name: REVIEW_TYPOS
    value: "true"
    description: Enable or disable typo detection reviews. Set to "true" or "false".
  - name: REVIEW_CODE_QUALITY
    value: "true"
    description: Enable or disable AI-based code quality reviews. Set to "true" or "false".
  - name: REVIEW_SECURITY
    value: "true"
    description: Enable or disable security pattern detection reviews. Set to "true" or "false".
  - name: AUTO_APPROVE_MINOR
    value: "false"
    description: Automatically approve PRs if no issues are found. Set to "true" or "false".
  - name: MAX_FILES_PER_REVIEW
    value: "50"
    description: The maximum number of files the agent will review per pull request.
  - name: MAX_LINES_PER_FILE
    value: "1000"
    description: The maximum number of lines of changes the agent will review per file.
  - name: WATCHED_REPOSITORIES
    value: ""
    description: A comma-separated list of GitHub repositories (e.g., "owner/repo,owner/repo2") that the agent should monitor for new pull requests.
  - name: AGENT_NAME
    value: PR Review Bot
    description: The name that the agent will use in its PR comments.
  - name: POLLING_INTERVAL
    value: "300"
    description: The frequency (in seconds) at which the agent checks for new pull requests when running in 'start' mode.
  - name: MAX_RETRIES
    value: "3"
    description: The maximum number of retries for API calls.