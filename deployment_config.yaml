name: PR Review Agent
summary: An AI-powered agent that automates pull request reviews on GitHub, checking for typos, code quality, and security vulnerabilities.
environment_variables:
  - name: GITHUB_TOKEN
    value: <your_github_personal_access_token>
    description: Your GitHub Personal Access Token with repo permissions. Required for the agent to authenticate and interact with the GitHub API.
  - name: GITHUB_WEBHOOK_SECRET
    value: ""
    description: Optional. A secret used for validating GitHub webhook payloads, enhancing security for advanced integrations.
  - name: AI_PROVIDER
    value: openai
    description: Specifies which AI service to use for code review. Accepted values are "openai" or "anthropic".
  - name: OPENAI_API_KEY
    value: <your_openai_api_key>
    description: The API key for OpenAI, required if AI_PROVIDER is set to "openai".
  - name: ANTHROPIC_API_KEY
    value: ""
    description: The API key for Anthropic, required if AI_PROVIDER is set to "anthropic".
  - name: REVIEW_TYPOS
    value: "true"
    description: A boolean flag (true/false) to enable or disable typo and grammar reviews.
  - name: REVIEW_CODE_QUALITY
    value: "true"
    description: A boolean flag (true/false) to enable or disable AI-based code quality reviews.
  - name: REVIEW_SECURITY
    value: "true"
    description: A boolean flag (true/false) to enable or disable security vulnerability reviews.
  - name: AUTO_APPROVE_MINOR
    value: "false"
    description: A boolean flag (true/false) to automatically approve PRs if no issues are found.
  - name: MAX_FILES_PER_REVIEW
    value: "50"
    description: The maximum number of files the agent will review per pull request.
  - name: MAX_LINES_PER_FILE
    value: "1000"
    description: The maximum number of lines to review per file.
  - name: WATCHED_REPOSITORIES
    value: ""
    description: A comma-separated list of GitHub repositories (e.g., owner/repo,owner/repo2) that the agent should monitor for new pull requests.
  - name: AGENT_NAME
    value: PR Review Bot
    description: The name that the agent will use when posting comments on pull requests.
  - name: POLLING_INTERVAL
    value: "300"
    description: How often (in seconds) the agent should check for new pull requests.
  - name: MAX_RETRIES
    value: "3"
    description: The maximum number of retries for API calls.