name: PR Review Agent
summary: AI-powered PR review agent for automated code review and typo detection. It monitors GitHub repositories for new pull requests and provides automated reviews.
environment_variables:
  - name: GITHUB_TOKEN
    value: <your_github_personal_access_token>
    description: Your GitHub Personal Access Token with 'repo' permissions. Get one at https://github.com/settings/tokens.
  - name: GITHUB_WEBHOOK_SECRET
    value: ""
    description: Optional. A secret for verifying GitHub webhook payloads, for advanced integrations.
  - name: AI_PROVIDER
    value: openai # or anthropic
    description: Choose your AI provider for code reviews. Supported values are "openai" or "anthropic".
  - name: OPENAI_API_KEY
    value: <your_openai_api_key>
    description: Your OpenAI API Key, required if AI_PROVIDER is set to "openai". Get one at https://platform.openai.com/api-keys.
  - name: ANTHROPIC_API_KEY
    value: <your_anthropic_api_key>
    description: Your Anthropic API Key, required if AI_PROVIDER is set to "anthropic". Get one at https://console.anthropic.com/.
  - name: REVIEW_TYPOS
    value: "true"
    description: Set to "true" to enable typo detection reviews, "false" to disable.
  - name: REVIEW_CODE_QUALITY
    value: "true"
    description: Set to "true" to enable AI-powered code quality reviews, "false" to disable.
  - name: REVIEW_SECURITY
    value: "true"
    description: Set to "true" to enable security vulnerability reviews, "false" to disable.
  - name: AUTO_APPROVE_MINOR
    value: "false"
    description: Set to "true" to automatically approve PRs if no issues are found, "false" otherwise.
  - name: MAX_FILES_PER_REVIEW
    value: "50"
    description: The maximum number of files the agent will review per pull request.
  - name: MAX_LINES_PER_FILE
    value: "1000"
    description: The maximum number of lines per file that the agent will review.
  - name: WATCHED_REPOSITORIES
    value: <owner/repo,owner/repo2>
    description: A comma-separated list of GitHub repositories (e.g., owner/repo,owner/repo2) that the agent should monitor for new pull requests.
  - name: AGENT_NAME
    value: PR Review Bot
    description: The name that the agent will use in its PR comments.
  - name: POLLING_INTERVAL
    value: "300"
    description: The frequency (in seconds) at which the agent checks for new pull requests in monitored repositories.
  - name: MAX_RETRIES
    value: "3"
    description: The maximum number of retries for API calls in case of transient errors.